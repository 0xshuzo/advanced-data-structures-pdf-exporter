name: "Advanced Data Structures PDF Exporter: Check Upstream Slides"

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * 1'

permissions:
  contents: write

concurrency:
  group: check-upstream-advanced-data-structures
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Detect upstream slide changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pdf_exporter upstream \
            --course advanced-data-structures \
            --github-output

      - name: Dispatch export workflow
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINGERPRINT: ${{ steps.check.outputs.fingerprint }}
          REASON: ${{ steps.check.outputs.reason }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d "{\"event_type\":\"advanced-data-structures-slides-updated\",\"client_payload\":{\"fingerprint\":\"${FINGERPRINT}\",\"reason\":\"${REASON}\"}}"
