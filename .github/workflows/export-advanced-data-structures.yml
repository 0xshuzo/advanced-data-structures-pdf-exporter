name: "Advanced Data Structures PDF Exporter: Export PDFs"

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - advanced-data-structures-slides-updated

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: export-advanced-data-structures
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Discover current slide deck manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_PATH: ${{ runner.temp }}/advanced-data-structures-manifest.json
        run: |
          python -m pdf_exporter upstream \
            --course advanced-data-structures \
            --manifest-path "${MANIFEST_PATH}"
          echo "Discovered manifest:"
          cat "${MANIFEST_PATH}"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Export latest lecture PDFs
        env:
          MANIFEST_PATH: ${{ runner.temp }}/advanced-data-structures-manifest.json
        run: |
          python -m pdf_exporter export \
            --manifest-path "${MANIFEST_PATH}" \
            --outdir ./pdfs \
            --timeout 45 \
            --retries 3

      - name: Persist upstream source state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pdf_exporter upstream \
            --course advanced-data-structures \
            --write-state

      - name: Commit updated PDFs and state
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || github.ref_name }}
          FINGERPRINT: ${{ github.event.client_payload.fingerprint || 'manual' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pdfs .github/state/advanced-data-structures-upstream.json
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "Update Advanced Data Structures slides (${FINGERPRINT})"
          git pull --rebase origin "${DEFAULT_BRANCH}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build GitHub Pages site
        env:
          STATE_PATH: .github/state/advanced-data-structures-upstream.json
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          python -m pdf_exporter site \
            --manifest-path "${STATE_PATH}" \
            --pdf-dir ./pdfs \
            --output-dir ./site \
            --repo-url "${REPO_URL}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
